<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Roblox 発掘プロトタイプ</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; }
        .card { background: white; border-radius: 10px; padding: 20px; margin: 10px auto; width: 300px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { background: #0070f3; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🚀 Roblox 未発掘ゲーム表示</h1>
    <p>APIから最新のデータを取得します</p>
    <div id="game-list">ロード中...</div>

    <script>
        // これはサンプルのUniverseIdです（人気のゲーム1つ）
        const universeId = 155615604; 

        async function fetchGame() {
            try {
                // 本来はサーバーが必要ですが、テスト用に公開情報を取得します
                const response = await fetch(`https://games.roblox.com/v1/games?universeIds=${universeId}`);
                const data = await response.json();
                const game = data.data[0];

                document.getElementById('game-list').innerHTML = `
                    <div class="card">
                        <h3>${game.name}</h3>
                        <p>現在遊んでいる人: <strong>${game.playing}人</strong></p>
                        <a href="https://www.roblox.com/games/${game.rootPlaceId}" target="_blank">
                            <button>このゲームを見に行く</button>
                        </a>
                    </div>
                `;
            } catch (error) {
                document.getElementById('game-list').innerHTML = "データの取得に失敗しました。公開後に確認してください。";
            }
        }
        fetchGame();
    </script>
</body>
</html>
